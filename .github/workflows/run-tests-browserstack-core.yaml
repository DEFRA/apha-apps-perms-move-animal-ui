name: Browserstack tests (core)

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: '094954420758'

concurrency:
  group: browserstack-core-tests

jobs:
  build:
    name: CDP-build-workflow
    env:
      GATEWAY_ID: ${{ secrets.GATEWAY_ID }}
      GATEWAY_PASSWORD: ${{ secrets.GATEWAY_PASSWORD }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Start docker compose
        env:
          GATEWAY_ID: ${{ secrets.GATEWAY_ID }}
          GATEWAY_PASSWORD: ${{ secrets.GATEWAY_PASSWORD }}
          DEFRA_ID_CLIENT_SECRET: ${{ secrets.DEFRA_ID_CLIENT_SECRET }}
          DEFRA_ID_ENABLED: false
        run: |
          docker compose up --wait-timeout 300 -d --quiet-pull

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready at http://localhost:3000..."
          max_attempts=60
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s -o /dev/null http://localhost:3000; then
              echo "App is ready!"
              exit 0
            fi

            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: App not ready yet, waiting 5 seconds..."
            sleep 5
          done

          echo "ERROR: App failed to become ready after $max_attempts attempts"
          echo "Checking docker compose status:"
          docker compose ps
          echo "Checking docker compose logs:"
          docker compose logs
          exit 1

      - name: Browserstack tests
        run: |
          npm ci
          npm run user-journey-test:bs
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
          DEFRA_ID_ENABLED: false

      - name: Capture docker compose logs on failure
        if: failure()
        run: |
          echo "=========================================="
          echo "Docker Compose Status:"
          echo "=========================================="
          docker compose ps
          echo ""
          echo "=========================================="
          echo "Docker Compose Logs:"
          echo "=========================================="
          docker compose logs

      - name: cleanup
        if: always()
        run: docker compose down
